# Sunsetr Configuration
# Automatic blue light filter for Wayland compositors

[general]
# Transition mode: "geo" (location-based), "static", "finish_by", "start_at", "center"
transition_mode = "geo"

# Backend: "hyprland", "wayland", or "hyprsunset"
# For niri, use "wayland" backend
backend = "wayland"

# Smooth transition duration in seconds (0.1-60)
transition_duration = 3.0

[temperatures]
# Color temperature in Kelvin (1000-20000)
# Lower values = warmer (more red), higher values = cooler (more blue)
day = 6500    # Standard daylight
night = 3300  # Warm evening light

[gamma]
# Gamma adjustment percentage (10-100)
day = 100
night = 100

[location]
# Geographic coordinates for sunrise/sunset calculation
# Will auto-detect from system timezone if not specified
# Uncomment and set your coordinates for more accurate times:
# latitude = 0.0
# longitude = 0.0

# You can also run 'sunsetr geo' to interactively select your city

[presets]
# Custom presets you can switch to with 'sunsetr preset <name>'
# Useful for gaming, movies, or other activities

[presets.disabled]
# Disabled preset - keeps normal daylight temperature at all times
day = 6500
night = 6500  # Same as day = disabled

[presets.default]
# Default preset - normal blue light filtering
day = 6500
night = 3300

# [presets.gaming]
# day = 6500
# night = 6500  # Disable night mode for gaming

# [presets.reading]
# day = 6500
# night = 2700  # Extra warm for reading